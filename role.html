<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            jakarta: ['Plus Jakarta Sans', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <title>Role</title>
</head>

<body class="bg-[#F7F8FC]">

  <section class="min-h-screen flex items-center justify-center p-6">

    <div
      class="w-full max-w-6xl bg-white rounded-2xl overflow-hidden shadow-sm"
    >

      <div class="grid grid-cols-1 lg:grid-cols-2">

        <!-- LEFT SIDE -->
        <div class="p-8 lg:p-12">

          <!-- LOGO -->
          <img
            src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780245572/Text_e0vh6o.png"
            alt="HRFlow Africa"
            class="w-[140px] mb-10"
          />

          <!-- HEADING -->
          <h2
            class="font-jakarta text-[28px] font-semibold text-[#101828] mb-8"
          >
            What is your role?
          </h2>

          <p
            class="font-inter text-[#212529] mb-8"
          >
            This helps us personalize your HR experience
          </p>

          <!-- FORM -->
          <form class="space-y-5">

            <!-- ROLE -->
            <div>
              <label
                class="block mb-2 text-sm font-medium text-[#344054]"
              >
                Your Role
              </label>

              <select
                class="w-full h-12 px-4 border border-[#D0D5DD] rounded-lg outline-none focus:border-[#3856D6] mb-8"
              >
                <option>Select your role</option>
                <option>HR Manager</option>
                <option>Recruiter</option>
                <option>Administrator</option>
                <option>Employee</option>
                <option>Team Lead</option>
              </select>
            </div>

            <!-- INFO BOX -->
            <div
              class="bg-[#e5e9f8] border border-[#EAECF0] rounded-lg p-4 flex items-center gap-3 w-full max-w-xs"
            >

              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5 text-[#667085]"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>

              <p class="text-sm text-[#6C757D]">
                You can update your role anytime
              </p>

            </div>

            <!-- BUTTON -->
            <button
              id="saveContinueBtn"
              type="submit"
              class="w-full h-12 bg-[#3856D6] text-white rounded-lg font-jakarta font-bold hover:bg-blue-700 transition-all duration-300 mt-4"
            >
              Save & Continue
            </button>

          </form>

        </div>

        <!-- RIGHT SIDE -->
        <div
          class="hidden lg:flex items-center justify-center bg-[#ffffff] p-8 border-l overflow-hidden"
        >

          <img
            src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780496454/image_3_zuhteo.png"
            alt="Role Selection"
            class="w-full max-h-[500px] h-auto object-contain"
          >

        </div>

      </div>

    </div>

  </section>

  <script>
    const saveContinueBtn = document.getElementById("saveContinueBtn");

    saveContinueBtn?.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "success.html";
    });
  </script>

</body>
</html>
