<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
        rel="stylesheet"
    >
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-6xl bg-white rounded-lg shadow-lg overflow-hidden">

        <div class="grid md:grid-cols-2">

            <!-- LEFT -->
            <div class="p-8 lg:p-14">

                <!-- Logo -->
                <div class="mb-12">
                    <img
                        src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780245572/Text_e0vh6o.png"
                        alt="HRFlow Africa"
                        class="w-32 md:w-36"
                    >
                </div>

                <h2
                    class="font-inter text-3xl font-bold text-gray-800 mb-8"
                >
                    Tell us about your organization
                </h2>

                <form class="space-y-6">

                    <!-- Organization Name -->
                    <div>

                        <label
                            class="block font-jakarta text-sm font-medium text-gray-700 mb-2"
                        >
                            Organization Name
                        </label>

                        <input
                            type="text"
                            class="w-full h-12 px-4 border border-gray-300 rounded-md font-jakarta outline-none focus:border-[#3856D6]"
                        >

                    </div>

                    <!-- Industry -->
                    <div>

                        <label
                            class="block font-jakarta text-sm font-medium text-gray-700 mb-2"
                        >
                            Industry
                        </label>

                        <select
                            class="w-full h-12 px-4 border border-gray-300 rounded-md font-jakarta text-gray-400 outline-none focus:border-[#3856D6]"
                        >
                            <option selected disabled>
                                Select Industry
                            </option>

                            <option>Technology</option>
                            <option>Healthcare</option>
                            <option>Finance</option>
                            <option>Education</option>
                            <option>Manufacturing</option>
                        </select>

                    </div>

                    <!-- Organization Size -->
                    <div>

                        <label
                            class="block font-jakarta text-sm font-medium text-gray-700 mb-2"
                        >
                            Organization Size
                        </label>

                        <select
                            class="w-full h-12 px-4 border border-gray-300 rounded-md font-jakarta text-gray-400 outline-none focus:border-[#3856D6]"
                        >
                            <option selected disabled>
                                Select Size
                            </option>

                            <option>1 - 10 Employees</option>
                            <option>11 - 50 Employees</option>
                            <option>51 - 200 Employees</option>
                            <option>201 - 500 Employees</option>
                            <option>500+ Employees</option>
                        </select>

                    </div>

                    <!-- Country -->
                    <div>

                        <label
                            class="block font-jakarta text-sm font-medium text-gray-700 mb-2"
                        >
                            Country
                        </label>

                        <select
                            class="w-full h-12 px-4 border border-gray-300 rounded-md font-jakarta text-gray-400 outline-none focus:border-[#3856D6]"
                        >
                            <option selected disabled>
                                Select Country
                            </option>

                            <option>Nigeria</option>
                            <option>Ghana</option>
                            <option>Kenya</option>
                            <option>South Africa</option>
                        </select>

                    </div>

                    <button
                        type="submit"
                        class="w-full h-12 bg-[#3856D6] hover:bg-blue-700 text-white rounded-md font-inter font-semibold transition mt-4"
                    >
                    <a href="role.html">Save & Continue</a>
                        
                    </button>

                </form>

            </div>

            <!-- RIGHT -->
            <div
                class="bg-gray-50 flex items-center justify-center"
            >

                <img
                    src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780321890/Rectangle_81_ru0gnt.png"
                    alt="Organization Illustration"
                    class="w-full h-full object-cover"
                >

            </div>

        </div>

    </div>

    

</body>
</html>
